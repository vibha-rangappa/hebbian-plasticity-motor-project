[pytest]
# Restrict collection to the real test suite. Without this, pytest's default
# "*_test.py" pattern also matches circuit/wscale_test.py (a parameter-scan
# script, not a test). That file does `from brian2 import *`, which pulls in
# brian2's own top-level `test` function (its internal pytest-suite runner) --
# pytest then collects and RUNS it as `circuit/wscale_test.py::test`, which
# launches brian2's bundled test suite and hangs on
# brian2/tests/test_logger.py::test_file_logging_multiprocessing (a
# spawn-vs-fork multiprocessing deadlock on macOS/Python 3.11).
testpaths = tests
